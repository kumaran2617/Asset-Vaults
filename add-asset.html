<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AssetVault | Add Asset</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/auth.js"></script>
</head>
<body>
  <script>requireAuth();</script>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">AV</div>
        AssetVault
      </div>
      <div class="nav-group">
        <a class="nav-link" href="home.html">Home</a>
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="assets.html">Asset List</a>
        <a class="nav-link" href="add-asset.html">Add Asset</a>
        <a class="nav-link" href="asset-details.html">Asset Details</a>
        <a class="nav-link" href="assignment-history.html">Assignment History</a>
        <a class="nav-link" href="maintenance-log.html">Maintenance Log</a>
        <a class="nav-link" href="reports.html">Reports</a>
        <a class="nav-link" href="alerts.html">Alerts <span class="status-pill">3</span></a>
        <a class="nav-link" href="documents.html">Documents</a>
        <a class="nav-link" href="settings.html">Settings</a>
        <a class="nav-link" href="help.html">Help</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </div>
      <button class="btn btn-outline" data-logout>Logout</button>
    </aside>
    <main>
      <div class="topbar">
        <button class="btn btn-outline mobile-only" data-toggle-sidebar>Menu</button>
        <div class="search">Add new asset details...</div>
        <div>
          <strong data-user-name>Asset Manager</strong><br />
          <span class="helper" data-user-email>manager@assetvault.io</span>
        </div>
      </div>
      <section class="content">
        <div class="card">
          <h2>Add New Asset</h2>
          <p class="helper">Register hardware with ownership, location, and compliance tags.</p>
        </div>
        <div class="card">
          <form class="form">
            <div class="input-group">
              <label>Asset Name</label>
              <input type="text" placeholder="MacBook Pro 16" required />
            </div>
            <div class="input-group">
              <label>Asset Type</label>
              <select required>
                <option>Laptop</option>
                <option>Desktop</option>
                <option>Network Equipment</option>
                <option>Mobile Device</option>
              </select>
            </div>
            <div class="input-group">
              <label>Serial Number</label>
              <input type="text" placeholder="SN-AX91-2026" required />
            </div>
            <div class="input-group">
              <label>Assigned To</label>
              <input type="text" placeholder="Priya Patel" />
            </div>
            <div class="input-group">
              <label>Location</label>
              <select required>
                <option>Bangalore HQ</option>
                <option>Hyderabad Hub</option>
                <option>Chennai Lab</option>
                <option>Remote</option>
              </select>
            </div>
            <div class="input-group">
              <label>Warranty End</label>
              <input type="date" required />
            </div>
            <button class="btn btn-primary" type="submit">Save Asset</button>
          </form>
        </div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
